<!DOCTYPE html>
<html>
<head>
    <title>My Simple Website</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Welcome to My Website</h1>
    <p>This is my first HTML website 😊</p>
</header>

<section>
    <h2>About Me</h2>
    <p>Hello! I m Shalini . I m learning web developement.</p>
</section>

<section>
    <h2>My Image</h2>
    <img src="https://via.placeholder.com/300" alt="Sample Image">
</section>

<section>
    <h2>My Video</h2>
    <video controls>
        <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
    </video>
</section>

<!-- VARIABLES -->
<section>
    <h2>Variables</h2>
    <p id="varText"></p>
    <button onclick="increase()">Increase</button>
</section>

<!-- FUNCTIONS -->
<section>
    <h2>Functions</h2>
    <button onclick="changeText()">Change Title</button>
</section>

<!-- OBJECT -->
<section>
    <h2>Object</h2>
    <p id="objText"></p>
    <button onclick="updateRole()">Update Role</button>
</section>

<!-- POPUPS -->
<section>
    <h2>Popups</h2>
    <button onclick="showAlert()">Alert</button>
    <button onclick="showConfirm()">Confirm</button>
    <button onclick="showPrompt()">Prompt</button>
    <p id="popup"></p>
</section>

<!-- EVENTS -->
<section>
    <h2>Events</h2>

    <input type="text" id="inputBox" placeholder="Type something">
    <p id="live"></p>

    <div id="box" style="width:100px;height:100px;background:lightblue;margin:auto;">
        Hover me
    </div>
</section>

<!-- JS FILE LINK -->
<script src="script.js"></script>

</body>
</html>
