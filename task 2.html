<!DOCTYPE html>
<html>
<head>
    <title>My Simple Professional Website</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f9f9f9;
            color: #333;
            margin: 0;
            padding: 0;
            text-align: center;
        }

        header {
            background-color: #4CAF50;
            color: white;
            padding: 25px;
        }

        header h1 {
            margin-bottom: 10px;
        }

        section {
            padding: 20px;
            margin: 20px auto;
            max-width: 800px;
            background-color: white;
            border-radius: 10px;
        }

        section h2 {
            color: #4CAF50;
            margin-bottom: 10px;
        }

        img {
            width: 300px;
            border-radius: 8px;
            margin-top: 10px;
        }

        video {
            width: 400px;
            margin-top: 15px;
            border-radius: 8px;
        }

        footer {
            background-color: #333;
            color: white;
            padding: 15px;
            margin-top: 30px;
        }

        @media (max-width: 600px) {
            img, video {
                width: 90%;
            }
        }
    </style>
</head>
<body>

<header>
    <h1>Welcome to My Website</h1>
    <p>Hello! I'm Shalini. Learning web development step by step.</p>
</header>

<section>
    <h2>About Me</h2>
    <p>I am learning HTML and CSS. I enjoy creating simple and neat web pages.</p>
</section>

<section>
    <h2>My Image</h2>
    <img src="C:\Users\Shalini\Desktop\thumb-1920-852176.jpg" alt="Sample Image">
</section>

<section>
    <h2>My Video</h2>
    <video controls>
        <source src="sample-video.mp4" type="video/mp4">
        Your browser does not support video.
    </video>
</section>

</body>
</html>
